<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3;url=/en/games/gyro-maze/">
  <link rel="canonical" href="https://pinesoft.dev/en/games/gyro-maze/">
  <title>Redirecting</title>
</head>
<body>
  <script>
    (function() {
      var supported = ["ar","de","el","en","es","fr","he","hi","it","ja","ka","ko","la","mt","nl","pl","pt","ru","sv","tr","zh"];
      var userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
      var target = supported.indexOf(userLang) !== -1 ? userLang : 'en';
      window.location.replace('/' + target + '/games/gyro-maze/');
    })();
  </script>
  <p>Redirecting to <a href="/en/games/gyro-maze/">English</a>...</p>
</body>
</html>
