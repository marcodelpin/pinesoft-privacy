<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{reading.title}} — PineSoft</title>
  <meta name="description" content="{{reading.meta_description}}">
  <meta name="theme-color" content="#1B2A1B">
  <link rel="icon" type="image/svg+xml" href="/images/pinesoft_logo.svg">
  <link rel="stylesheet" href="/style.css">
{{hreflang}}
</head>
<body>

{{> nav}}

  <section class="section">
    <div class="container">
      <p class="breadcrumb"><a href="/{{lang}}/">{{nav.home}}</a> &rsaquo; {{nav.reading}}</p>
      <h1 class="section-title"><span class="pine">{{nav.reading}}</span> &amp; {{reading.reference}}</h1>
      <p class="section-subtitle">{{reading.subtitle}}</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="app-grid">

        <a href="/{{lang}}/reading/horatio/" class="app-card">
          <div class="app-card-icon">
            <img src="/images/horatio_icon.png" alt="Horatio" loading="lazy">
          </div>
          <div class="app-card-info">
            <div class="app-card-header">
              <h3>Horatio</h3>
              <span class="badge-coming-soon">{{common.soon}}</span>
            </div>
            <p class="app-card-category">{{reading.horatio.category}}</p>
            <p class="app-card-desc">{{reading.horatio.desc}}</p>
          </div>
        </a>

      </div>
    </div>
  </section>

{{> footer}}
{{> nav-script}}

</body>
</html>
