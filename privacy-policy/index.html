<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3;url=/en/privacy-policy/">
  <link rel="canonical" href="https://pinesoft.dev/en/privacy-policy/">
  <title>Redirecting</title>
</head>
<body>
  <script>
    (function() {
      var supported = ["ar","de","en","es","fr","hi","it","ja","ko","nl","pl","pt","ru","sv","tr","zh"];
      var userLang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
      var target = supported.indexOf(userLang) !== -1 ? userLang : 'en';
      window.location.replace('/' + target + '/privacy-policy/');
    })();
  </script>
  <p>Redirecting to <a href="/en/privacy-policy/">English</a>...</p>
</body>
</html>
